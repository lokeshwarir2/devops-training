name: Docker Image Smoke Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: docker pull lokeshwarir/admissionmanagementsystem

      - name: Start container
        run: |
          docker run -d --name admission-app -p 8080:8080 lokeshwarir/admissionmanagementsystem
          sleep 15
          docker ps

      - name: Smoke check
        run: |
          curl -I http://localhost:8080 || (docker logs admission-app && exit 1)

      - name: Stop container
        if: always()
        run: |
          docker stop admission-app || true
          docker rm admission-app || true
